# ─────────────────────────────────────────────────────────────
# WFX AI-Native ERP Platform — Docker Compose
# Local development setup (connects to hosted Supabase)
# ─────────────────────────────────────────────────────────────

services:

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wfx-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - backend_uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - wfx-network

  # ── Frontend SPA ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: wfx-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wfx-network

# ── Volumes ──────────────────────────────────────────────────
volumes:
  backend_uploads:
    driver: local

# ── Network ──────────────────────────────────────────────────
networks:
  wfx-network:
    driver: bridge
